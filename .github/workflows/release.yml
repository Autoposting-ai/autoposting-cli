name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: null
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Verify version sync
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SDK_VER=$(node -p "require('./packages/sdk/package.json').version")
          CLI_VER=$(node -p "require('./packages/cli/package.json').version")
          echo "Tag: $TAG | SDK: $SDK_VER | CLI: $CLI_VER"
          if [ "$TAG" != "$SDK_VER" ] || [ "$TAG" != "$CLI_VER" ]; then
            echo "::error::Version mismatch! Tag v$TAG but SDK=$SDK_VER CLI=$CLI_VER"
            exit 1
          fi
      - run: npm run typecheck
      - run: npm run build
      - name: Verify built binary prints the release version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          BIN_VER=$(node packages/cli/dist/cli.cjs --version)
          echo "Tag: $TAG | Built binary: $BIN_VER"
          if [ "$TAG" != "$BIN_VER" ]; then
            echo "::error::Built CLI binary reports $BIN_VER but the release tag is v$TAG"
            exit 1
          fi
      - run: npm test
      - run: npm run pack:smoke
      # Audit shipped deps only — dev-only tooling (changesets) vulns never reach the published tarball.
      - run: npm audit --omit=dev --audit-level=moderate
      - name: Publish SDK
        run: npm publish --workspace=packages/sdk --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish CLI
        run: npm publish --workspace=packages/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
